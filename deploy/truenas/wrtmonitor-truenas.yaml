services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wrtmonitor
      POSTGRES_USER: wrtmonitor
      POSTGRES_PASSWORD: change-me-postgres-password
    volumes:
      - wrtmonitor_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrtmonitor -d wrtmonitor"]
      interval: 10s
      timeout: 5s
      retries: 10

  wrtmonitor:
    image: ghcr.io/shurshick/wrtmonitor:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      WRTMONITOR_PUBLIC_SERVER_URL: https://monitor.example.ru
      WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-postgres-password@postgres:5432/wrtmonitor
      WRTMONITOR_BIND_HOST: 0.0.0.0
      WRTMONITOR_BIND_PORT: 8080
      WRTMONITOR_JWT_SECRET: change-me-long-random-jwt-secret
      WRTMONITOR_DEFAULT_LOCALE: ru
      WRTMONITOR_ALLOW_INSECURE_LOCAL: "false"
      WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS: "false"
      WRTMONITOR_ENABLE_API_DOCS: "false"
    volumes:
      - wrtmonitor_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  wrtmonitor_postgres:
  wrtmonitor_backups:

