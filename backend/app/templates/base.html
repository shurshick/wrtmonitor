<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WrtMonitor{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__content">
      <a class="brand" href="/"><span class="brand__mark">W</span><span>WrtMonitor</span></a>
      <span class="app-header__meta">Управление OpenWrt</span>
    </div>
  </header>
  <main class="page {% block page_class %}{% endblock %}">{% block content %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
</body>
</html>
