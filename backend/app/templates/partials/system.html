<section class="card">
  <h2>Система</h2>
  <p>Команда перезагрузки будет выполнена при следующем опросе агента.</p>
  {% if supports.system_reboot %}
  <form class="control-form" method="post" action="/devices/{{ device.id }}/web-command">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="command_type" value="router.reboot">
    <input type="hidden" name="confirmed" value="true">
    <div class="button-row">
      <button type="submit">Перезагрузить</button>
      <span class="risk-badge">risk: level 3</span>
    </div>
  </form>
  {% else %}
  <p class="muted">Команда скрыта: агент ещё не подтвердил поддержку перезагрузки.</p>
  {% endif %}
</section>
