<section class="card">
  <h2>Wi-Fi</h2>
  <ul>
    {% for radio in radios %}
    <li>{{ radio.name or 'radio' }}: {{ 'включён' if radio.up else 'выключен' }}; SSID: {{ radio.ssid|join(', ') or 'нет данных' }}</li>
    {% else %}<li>Wi-Fi радио не обнаружено</li>{% endfor %}
  </ul>
  <form method="post" action="/devices/{{ device.id }}/web-command">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="command_type" value="wifi.set_enabled">
    <label>Состояние <select name="enabled"><option value="true">Включить</option><option value="false">Выключить</option></select></label>
    <button>Применить</button>
  </form>
  <form method="post" action="/devices/{{ device.id }}/web-command">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="command_type" value="wifi.set_ssid">
    <label>Новый SSID <input name="ssid" required maxlength="64"></label><button>Изменить SSID</button>
  </form>
</section>
