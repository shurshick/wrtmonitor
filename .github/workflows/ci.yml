name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wrtmonitor_test
          POSTGRES_USER: wrtmonitor
          POSTGRES_PASSWORD: change-me-db-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrtmonitor -d wrtmonitor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: pytest backend/tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-db-password@localhost:5432/wrtmonitor_test
          WRTMONITOR_ALLOW_INSECURE_LOCAL: "true"

  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/wrtmonitor
    steps:
      - uses: actions/checkout@v4
      - run: docker build .
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish test image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build \
            -t "$IMAGE_NAME:0.1.0-test.5" \
            -t "$IMAGE_NAME:latest" \
            .
          docker push "$IMAGE_NAME:0.1.0-test.5"
          docker push "$IMAGE_NAME:latest"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew :android:app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: wrtmonitor-android-0.1.0-test.5-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
