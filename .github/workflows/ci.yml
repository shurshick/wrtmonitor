name: CI

on:
  push:
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wrtmonitor_test
          POSTGRES_USER: wrtmonitor
          POSTGRES_PASSWORD: change-me-db-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrtmonitor -d wrtmonitor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: pip install -r backend/requirements.txt
      - run: ruff check backend --select E9,F63,F7,F82
      - run: ruff format --check backend
      - run: pytest backend/tests openwrt-agent/tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-db-password@localhost:5432/wrtmonitor_test
          WRTMONITOR_ALLOW_INSECURE_LOCAL: "true"
          WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS: "true"
          WRTMONITOR_JWT_SECRET: ci-test-secret-value-with-more-than-32-characters
      - run: sh -n openwrt-agent/wrtmonitor-agent
      - run: sh -n openwrt-agent/install-openwrt.sh
      - run: for f in openwrt-agent/lib/*.sh; do sh -n "$f"; done
      - run: shellcheck --shell=sh openwrt-agent/wrtmonitor-agent
      - run: shellcheck --shell=sh openwrt-agent/install-openwrt.sh openwrt-agent/lib/*.sh
      - run: python -c "from backend.app.services.openwrt_downloads import ensure_openwrt_download_metadata; ensure_openwrt_download_metadata()"
      - run: cd openwrt-agent && sha256sum --check SHA256SUMS.txt

  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/wrtmonitor
    steps:
      - uses: actions/checkout@v4
      - name: Read release metadata
        run: echo "RELEASE_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
      - name: Build release image
        run: |
          docker build \
            -t "$IMAGE_NAME:$RELEASE_VERSION" \
            -t "$IMAGE_NAME:latest" \
            .
      - name: Smoke-test release image
        run: |
          docker run --rm \
            -e WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS=true \
            -e WRTMONITOR_JWT_SECRET=ci-test-secret-value-with-more-than-32-characters \
            "$IMAGE_NAME:$RELEASE_VERSION" \
            python -c "from pathlib import Path; from backend.app.main import app; from backend.app.config import APP_VERSION; expected = Path('/app/VERSION').read_text().strip(); assert APP_VERSION == expected == '$RELEASE_VERSION'; assert app.version == expected; print(expected)"
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$IMAGE_NAME:$RELEASE_VERSION"
          docker push "$IMAGE_NAME:latest"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew :android:app:assembleDebug
      - run: ./gradlew :android:app:testDebugUnitTest
      - uses: actions/upload-artifact@v4
        with:
          name: wrtmonitor-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read release metadata
        run: |
          echo "RELEASE_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$(cat RELEASE_TAG)" >> "$GITHUB_ENV"
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: test "$GITHUB_REF_NAME" = "$(cat RELEASE_TAG)"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: pip install -r backend/requirements.txt
      - run: python -c "from backend.app.services.openwrt_downloads import ensure_openwrt_download_metadata; ensure_openwrt_download_metadata()"
      - run: ./gradlew :android:app:assembleDebug
      - run: tar -czf "wrtmonitor-openwrt-agent-v$RELEASE_VERSION.tar.gz" -C openwrt-agent .
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk "wrtmonitor-android-v$RELEASE_VERSION-debug.apk"
      - run: cp deploy/truenas/wrtmonitor-truenas.yaml "wrtmonitor-truenas-v$RELEASE_VERSION.yaml"
      - run: cd openwrt-agent && sha256sum --check SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: wrtmonitor-release-artifacts
          path: |
            wrtmonitor-openwrt-agent-v${{ env.RELEASE_VERSION }}.tar.gz
            wrtmonitor-android-v${{ env.RELEASE_VERSION }}-debug.apk
            wrtmonitor-truenas-v${{ env.RELEASE_VERSION }}.yaml
            openwrt-agent/SHA256SUMS.txt
            openwrt-agent/agent-version.txt
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            "wrtmonitor-openwrt-agent-v$RELEASE_VERSION.tar.gz" \
            "wrtmonitor-android-v$RELEASE_VERSION-debug.apk" \
            "wrtmonitor-truenas-v$RELEASE_VERSION.yaml" \
            "openwrt-agent/SHA256SUMS.txt" \
            "openwrt-agent/agent-version.txt" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            --latest
