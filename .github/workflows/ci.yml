name: CI

on:
  push:
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wrtmonitor_test
          POSTGRES_USER: wrtmonitor
          POSTGRES_PASSWORD: change-me-db-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wrtmonitor -d wrtmonitor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y shellcheck postgresql-client
      - run: pip install -r backend/requirements.txt
      - run: pip install -r backend/requirements-browser.txt
      - run: python -m playwright install --with-deps chromium
      - run: ruff check backend --select E9,F63,F7,F82
      - run: ruff format --check backend
      - run: pytest backend/tests openwrt-agent/tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-db-password@localhost:5432/wrtmonitor_test
          WRTMONITOR_ALLOW_INSECURE_LOCAL: "true"
          WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS: "true"
          WRTMONITOR_JWT_SECRET: ci-test-secret-value-with-more-than-32-characters
          WRTMONITOR_SKIP_E2E: "0"
      - name: Verify PostgreSQL disaster recovery
        env:
          WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-db-password@localhost:5432/wrtmonitor_test
          WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS: "true"
          WRTMONITOR_JWT_SECRET: ci-test-secret-value-with-more-than-32-characters
        run: |
          python -m backend.app.backup_cli create /tmp/wrtmonitor-ci.dump
          python -m backend.app.backup_cli verify /tmp/wrtmonitor-ci.dump
          python -m backend.app.backup_cli drill /tmp/wrtmonitor-ci.dump
      - run: sh -n openwrt-agent/wrtmonitor-agent
      - run: sh -n openwrt-agent/install-openwrt.sh
      - run: for f in openwrt-agent/lib/*.sh; do sh -n "$f"; done
      - run: shellcheck --shell=sh openwrt-agent/wrtmonitor-agent
      - run: shellcheck --shell=sh openwrt-agent/install-openwrt.sh openwrt-agent/lib/*.sh
      - run: python -c "from backend.app.services.openwrt_downloads import ensure_openwrt_download_metadata; ensure_openwrt_download_metadata()"
      - run: cd openwrt-agent && sha256sum --check SHA256SUMS.txt
      - name: Browser smoke test
        env:
          WRTMONITOR_DATABASE_URL: postgresql+psycopg://wrtmonitor:change-me-db-password@localhost:5432/wrtmonitor_test
          WRTMONITOR_PUBLIC_SERVER_URL: http://127.0.0.1:8090
          WRTMONITOR_ALLOW_INSECURE_LOCAL: "true"
          WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS: "true"
          WRTMONITOR_JWT_SECRET: ci-test-secret-value-with-more-than-32-characters
        run: |
          python -c "from backend.tests.test_api import clear_database; clear_database()"
          python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8090 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in $(seq 1 30); do curl -fsS http://127.0.0.1:8090/health && break; sleep 1; done
          python backend/tests/browser_smoke.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: web-responsive-smoke
          path: artifacts/browser

  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/wrtmonitor
    steps:
      - uses: actions/checkout@v7
      - name: Read release metadata
        run: echo "RELEASE_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
      - name: Build release image
        run: |
          docker build \
            -t "$IMAGE_NAME:$RELEASE_VERSION" \
            -t "$IMAGE_NAME:latest" \
            .
      - name: Smoke-test release image
        run: |
          docker run --rm \
            -e WRTMONITOR_ALLOW_INSECURE_DEV_DEFAULTS=true \
            -e WRTMONITOR_JWT_SECRET=ci-test-secret-value-with-more-than-32-characters \
            "$IMAGE_NAME:$RELEASE_VERSION" \
            python -c "from pathlib import Path; from backend.app.main import app; from backend.app.config import APP_VERSION; expected = Path('/app/VERSION').read_text().strip(); assert APP_VERSION == expected == '$RELEASE_VERSION'; assert app.version == expected; print(expected)"
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$IMAGE_NAME:$RELEASE_VERSION"
          docker push "$IMAGE_NAME:latest"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew :android:app:assembleDebug
      - run: ./gradlew :android:app:testDebugUnitTest
      - uses: actions/upload-artifact@v7
        with:
          name: wrtmonitor-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release-artifacts:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Read release metadata
        run: |
          echo "RELEASE_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$(cat RELEASE_TAG)" >> "$GITHUB_ENV"
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: test "$GITHUB_REF_NAME" = "$(cat RELEASE_TAG)"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: pip install -r backend/requirements.txt
      - run: python -c "from backend.app.services.openwrt_downloads import ensure_openwrt_download_metadata; ensure_openwrt_download_metadata()"
      - name: Restore Android release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/wrtmonitor-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/wrtmonitor-release.jks" >> "$GITHUB_ENV"
      - name: Build signed Android release
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :android:app:assembleRelease
      - name: Verify Android signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose android/app/build/outputs/apk/release/app-release.apk
      - run: tar -czf "wrtmonitor-openwrt-agent-v$RELEASE_VERSION.tar.gz" -C openwrt-agent .
      - run: cp android/app/build/outputs/apk/release/app-release.apk "wrtmonitor-android-v$RELEASE_VERSION.apk"
      - run: cp deploy/truenas/wrtmonitor-truenas.yaml "wrtmonitor-truenas-v$RELEASE_VERSION.yaml"
      - run: cd openwrt-agent && sha256sum --check SHA256SUMS.txt
      - uses: actions/upload-artifact@v7
        with:
          name: wrtmonitor-release-artifacts
          path: |
            wrtmonitor-openwrt-agent-v${{ env.RELEASE_VERSION }}.tar.gz
            wrtmonitor-android-v${{ env.RELEASE_VERSION }}.apk
            wrtmonitor-truenas-v${{ env.RELEASE_VERSION }}.yaml
            openwrt-agent/SHA256SUMS.txt
            openwrt-agent/agent-version.txt
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            "wrtmonitor-openwrt-agent-v$RELEASE_VERSION.tar.gz" \
            "wrtmonitor-android-v$RELEASE_VERSION.apk" \
            "wrtmonitor-truenas-v$RELEASE_VERSION.yaml" \
            "openwrt-agent/SHA256SUMS.txt" \
            "openwrt-agent/agent-version.txt" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            --latest
